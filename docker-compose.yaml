version: '3.8'

# Production stack for ~290 users
# API: 3 replicas × 4 gunicorn workers = 12 workers total
# Celery: 2 workers × 4 concurrency = 8 background threads

x-api-env: &api-env
  DATABASE_URL: postgresql://vector_user:${POSTGRES_PASSWORD:-vector_password}@postgres:5432/vector_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  APP_NAME: Vector Database API
  APP_VERSION: 1.0.0
  DEBUG: "false"
  DEFAULT_M: "16"
  DEFAULT_EF_CONSTRUCTION: "200"
  DEFAULT_N_CLUSTERS: "100"
  # Internet search — free providers (no key needed if SearXNG running)
  SEARXNG_URL: http://searxng:8080
  SERPER_API_KEY: ${SERPER_API_KEY:-}
  TAVILY_API_KEY: ${TAVILY_API_KEY:-}
  EXA_API_KEY: ${EXA_API_KEY:-}
  BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
  SERPAPI_KEY: ${SERPAPI_KEY:-}
  # LLM — free/open providers
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  HF_API_KEY: ${HF_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
  # Paid LLM (optional)
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

x-api-volumes: &api-volumes
  - ./index_data:/app/index_data
  - ./indexes:/app/indexes
  - ./media_storage:/app/media_storage

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: vector_db
      POSTGRES_USER: vector_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user -d vector_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ── API replica 1 ───────────────────────────────────────────────────────────
  vector_api_1:
    build: .
    command: gunicorn api.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 120 --graceful-timeout 30
    environment:
      <<: *api-env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *api-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  # ── API replica 2 ───────────────────────────────────────────────────────────
  vector_api_2:
    build: .
    command: gunicorn api.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 120 --graceful-timeout 30
    environment:
      <<: *api-env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *api-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  # ── API replica 3 ───────────────────────────────────────────────────────────
  vector_api_3:
    build: .
    command: gunicorn api.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 120 --graceful-timeout 30
    environment:
      <<: *api-env
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *api-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  # ── SearXNG (self-hosted search, no API key needed) ─────────────────────────
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-changeme-use-random-string}
      SEARXNG_BASE_URL: http://searxng:8080
    volumes:
      - searxng_data:/etc/searxng
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      - vector_api_1
      - vector_api_2
      - vector_api_3
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery worker 1 (crawl + ANN indexing) ──────────────────────────────────
  celery_worker_1:
    build: .
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q celery,crawl,indexing
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *api-volumes
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  # ── Celery worker 2 (RAG ingest + embeddings) ───────────────────────────────
  celery_worker_2:
    build: .
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q celery,rag,embeddings
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *api-volumes
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  # ── Celery Beat (recrawl scheduler, index compaction) ───────────────────────
  celery_beat:
    build: .
    command: celery -A celery_app beat --loglevel=info
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  searxng_data:

networks:
  default:
    name: vector_db_network
    driver: bridge
