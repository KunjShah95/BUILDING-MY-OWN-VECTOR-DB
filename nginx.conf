# Production nginx for Vector DB / Web Search Engine
# Tuned for ~290 concurrent users, 3 gunicorn replicas

# ── Rate-limit zones ─────────────────────────────────────────────────────────
# $binary_remote_addr zones cost 1 byte per IP entry
limit_req_zone  $binary_remote_addr zone=api_general:10m  rate=20r/s;
limit_req_zone  $binary_remote_addr zone=api_search:10m   rate=10r/s;
limit_req_zone  $binary_remote_addr zone=api_crawl:10m    rate=2r/s;
limit_req_zone  $binary_remote_addr zone=api_ingest:10m   rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── Upstream pool (3 gunicorn replicas in docker-compose) ────────────────────
upstream vector_api {
    least_conn;
    server vector_api_1:8000 max_fails=3 fail_timeout=15s;
    server vector_api_2:8000 max_fails=3 fail_timeout=15s;
    server vector_api_3:8000 max_fails=3 fail_timeout=15s;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name vector-db.example.com;

    # TLS
    ssl_certificate     /etc/ssl/certs/vector-db.crt;
    ssl_certificate_key /etc/ssl/private/vector-db.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;

    # Timeouts (search + crawl can be slow)
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Buffers
    proxy_buffer_size         16k;
    proxy_buffers             8 32k;
    proxy_busy_buffers_size   64k;

    # Gzip
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_proxied any;
    gzip_vary on;

    # Connection limit per IP (prevents connection exhaustion)
    limit_conn conn_per_ip 30;

    client_max_body_size 50m;  # file ingest

    # ── Common proxy headers ──────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Search endpoints — tighter rate limit ─────────────────────────────────
    location ~ ^/api/web/(search|global|answer) {
        limit_req zone=api_search burst=20 nodelay;
        proxy_pass http://vector_api;
    }

    # ── Crawl — very tight (expensive operation) ──────────────────────────────
    location ~ ^/api/web/crawl {
        limit_req zone=api_crawl burst=5 nodelay;
        proxy_read_timeout 300s;
        proxy_pass http://vector_api;
    }

    # ── RAG ingest (file upload, may take time) ───────────────────────────────
    location ~ ^/api/rag/ingest {
        limit_req zone=api_ingest burst=10 nodelay;
        proxy_read_timeout 180s;
        proxy_pass http://vector_api;
    }

    # ── RAG streaming (SSE — disable buffering) ───────────────────────────────
    location /api/rag/query/stream {
        limit_req zone=api_general burst=10 nodelay;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        add_header X-Accel-Buffering no;
        proxy_pass http://vector_api;
    }

    # ── GraphQL (interactive, allow larger bursts) ────────────────────────────
    location /graphql {
        limit_req zone=api_general burst=40 nodelay;
        proxy_pass http://vector_api;
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://vector_api;
    }

    # ── Health check (no rate limit, no logs) ─────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://vector_api;
    }

    # Rate limit error page
    error_page 429 @too_many;
    location @too_many {
        add_header Content-Type application/json always;
        add_header Retry-After 10 always;
        return 429 '{"error":"rate_limit_exceeded","retry_after_seconds":10}';
    }
}
