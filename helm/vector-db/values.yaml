replicaCount: 1

image:
  repository: vector-db-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  host: vector-db.local

postgresql:
  enabled: true
  auth:
    username: vector_user
    password: vector_password
    database: vector_db
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: false

env:
  APP_NAME: "Vector Database API"
  DEBUG: "false"
  STORAGE_PROVIDER: local
  DEFAULT_EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  EMBEDDING_DEVICE: cpu

persistence:
  enabled: true
  size: 5Gi
  media:
    enabled: true
    size: 10Gi
  indexes:
    enabled: true
    size: 1Gi

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPU: 70
  targetQPS: 1000
  # Legacy key kept for backward compat
  targetCPUUtilizationPercentage: 70

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
    port: http

# Spot / preemptible node support
nodeSelector: {}
#   cloud.google.com/gke-spot: "true"
#   eks.amazonaws.com/capacityType: SPOT

tolerations: []
#   - key: "spot"
#     operator: "Equal"
#     value: "true"
#     effect: "NoSchedule"

spotNodepool:
  enabled: false
  nodeSelector:
    cloud.google.com/gke-spot: "true"
  tolerations:
    - key: spot
      operator: Equal
      value: "true"
      effect: NoSchedule
