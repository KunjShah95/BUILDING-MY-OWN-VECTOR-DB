apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vector-db.fullname" . }}
  labels:
    {{- include "vector-db.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vector-db.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vector-db.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vector-db.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vector-db.fullname" . }}
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: APP_NAME
              value: "{{ .Values.env.APP_NAME }}"
            - name: DEBUG
              value: "{{ .Values.env.DEBUG }}"
            - name: STORAGE_PROVIDER
              value: "{{ .Values.env.STORAGE_PROVIDER }}"
            - name: DEFAULT_EMBEDDING_MODEL
              value: "{{ .Values.env.DEFAULT_EMBEDDING_MODEL }}"
            - name: EMBEDDING_DEVICE
              value: "{{ .Values.env.EMBEDDING_DEVICE }}"
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: media-storage
              mountPath: /app/media_storage
            - name: index-storage
              mountPath: /app/indexes
      volumes:
        - name: media-storage
          {{- if .Values.persistence.media.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vector-db.fullname" . }}-media
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: index-storage
          {{- if .Values.persistence.indexes.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vector-db.fullname" . }}-indexes
          {{- else }}
          emptyDir: {}
          {{- end }}
