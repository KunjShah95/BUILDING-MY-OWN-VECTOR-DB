name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vector_user
          POSTGRES_PASSWORD: vector_password
          POSTGRES_DB: vector_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Security scan
      run: |
        pip install pip-audit
        pip-audit

    - name: Run tests (standalone)
      run: |
        python -m pytest test/test_hnsw.py test/test_ivf.py test/test_clustering.py test/test_kdtree.py test/test_rag.py test/test_image_metadata.py test/test_phase1_unit.py -v --cov=utils --cov=services --cov-report=term --cov-report=xml

    - name: Create DB schema
      env:
        DATABASE_URL: postgresql://vector_user:vector_password@localhost:5432/vector_db_test
      run: |
        python -c "from config.database import Base, engine; Base.metadata.create_all(bind=engine)"

    - name: Run DB-dependent tests
      env:
        DATABASE_URL: postgresql://vector_user:vector_password@localhost:5432/vector_db_test
      run: |
        python -m pytest test/test_vector_db.py -v

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install lint tools
      run: pip install ruff
    - name: Lint
      run: ruff check . --ignore=E501,F401

  docker:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/vector-db:latest
          ${{ secrets.DOCKER_USERNAME }}/vector-db:${{ github.sha }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/vector-db:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
